name: CLI docs check

on:
  pull_request:

jobs:
  cli-docs:
    name: CLI manpage gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check CLI changes and manpage
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- coldbrew-cli-docs -->";
            const { owner, repo, number: pull_number } = context.issue;

            if (!pull_number) {
              core.info("Not running in a pull request context.");
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const filenames = files.map((file) => file.filename);
            const isCliFile = (name) =>
              name === "src/cli/mod.rs" || name.startsWith("src/cli/commands/");
            const touchedCli = filenames.filter(isCliFile);
            const cliTouched = touchedCli.length > 0;
            const manpageTouched = filenames.includes("docs/man/crew.1");

            core.info(`cliTouched=${cliTouched} manpageTouched=${manpageTouched}`);

            const commentBody = [
              marker,
              ":warning: CLI commands changed but the manpage was not updated.",
              "",
              "Please update `docs/man/crew.1` to reflect the CLI changes.",
              "",
              "Changed CLI files:",
              ...touchedCli.map((name) => `- \`${name}\``),
            ].join("\n");

            async function findComment() {
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pull_number, per_page: 100 }
              );
              return comments.find(
                (comment) =>
                  comment.user &&
                  comment.user.type === "Bot" &&
                  comment.body &&
                  comment.body.includes(marker)
              );
            }

            async function upsertComment() {
              const existing = await findComment();
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: commentBody,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: commentBody,
              });
            }

            async function clearComment() {
              const existing = await findComment();
              if (!existing) {
                return;
              }

              try {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                });
              } catch (error) {
                core.warning(`Unable to delete comment: ${error.message}`);
              }
            }

            if (cliTouched && !manpageTouched) {
              try {
                await upsertComment();
              } catch (error) {
                core.warning(`Unable to post comment: ${error.message}`);
              }

              core.setFailed(
                "CLI commands changed without updating docs/man/crew.1"
              );
              return;
            }

            if (cliTouched && manpageTouched) {
              await clearComment();
            }

            if (!cliTouched) {
              core.info("No CLI changes detected.");
            }
